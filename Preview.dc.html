<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Prompt',sans-serif;background:#e7e3da;-webkit-font-smoothing:antialiased}
</style>
</helmet>
<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;gap:24px;padding:36px 24px 60px">
  <div style="text-align:center">
    <div style="font-size:12px;letter-spacing:4px;text-transform:uppercase;color:#8f6f33;margin-bottom:6px">Live Preview</div>
    <div style="font-size:22px;font-weight:600;color:#2c2620">ฟ้าประทาน · Salepage</div>
  </div>

  <div style="display:inline-flex;background:#fff;border:1px solid rgba(176,139,70,.28);border-radius:999px;padding:5px;gap:4px;box-shadow:0 6px 18px rgba(44,38,32,.08)">
    <button onClick="{{ setMobile }}" style="{{ mobileBtnStyle }}">📱 มือถือ</button>
    <button onClick="{{ setDesktop }}" style="{{ desktopBtnStyle }}">🖥️ เดสก์ท็อป</button>
  </div>

  <sc-if value="{{ isMobile }}" hint-placeholder-val="{{ true }}">
    <div style="position:relative;width:402px;max-width:100%;height:842px;background:#1c1814;border-radius:54px;padding:13px;box-shadow:0 40px 90px rgba(28,24,20,.34),0 0 0 2px rgba(255,255,255,.06) inset">
      <div style="position:absolute;top:50%;left:-3px;width:3px;height:64px;background:#2c2620;border-radius:3px 0 0 3px;transform:translateY(-130px)"></div>
      <div style="position:absolute;top:50%;right:-3px;width:3px;height:80px;background:#2c2620;border-radius:0 3px 3px 0;transform:translateY(-30px)"></div>
      <div style="position:relative;width:100%;height:100%;border-radius:42px;overflow:hidden;background:#f7f2e9">
        <div style="position:absolute;top:0;left:50%;transform:translateX(-50%);width:128px;height:30px;background:#1c1814;border-radius:0 0 18px 18px;z-index:5"></div>
        <iframe src="./Salepage.dc.html" title="mobile" style="width:100%;height:100%;border:0;display:block"></iframe>
      </div>
    </div>
  </sc-if>

  <sc-if value="{{ isDesktop }}" hint-placeholder-val="{{ false }}">
    <div style="width:1180px;max-width:96vw;border-radius:12px;overflow:hidden;background:#fff;box-shadow:0 40px 90px rgba(28,24,20,.28);border:1px solid rgba(176,139,70,.2)">
      <div style="display:flex;align-items:center;gap:8px;padding:12px 16px;background:#efe7d8;border-bottom:1px solid rgba(176,139,70,.18)">
        <span style="width:12px;height:12px;border-radius:50%;background:#e0726a"></span>
        <span style="width:12px;height:12px;border-radius:50%;background:#e6b94f"></span>
        <span style="width:12px;height:12px;border-radius:50%;background:#69b06a"></span>
        <span style="margin-left:14px;font-size:12.5px;color:#8f6f33;background:#fff;border:1px solid rgba(176,139,70,.22);border-radius:999px;padding:4px 16px">fahpataan.com · VIP Package 2026</span>
      </div>
      <iframe src="./Salepage.dc.html" title="desktop" style="width:100%;height:760px;border:0;display:block"></iframe>
    </div>
  </sc-if>

  <a href="./Salepage.dc.html" style="font-size:13.5px;font-weight:500;color:#8f6f33;border-bottom:1px solid #cdb583;padding-bottom:3px;text-decoration:none">เปิดหน้าเต็มจอ →</a>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { device: 'mobile' };
  renderVals() {
    const d = this.state.device;
    const base = 'border:0;cursor:pointer;font-family:Prompt,sans-serif;font-size:14px;font-weight:500;padding:9px 20px;border-radius:999px;transition:all .18s';
    const on = base + ';background:#2c2620;color:#f7f2e9';
    const off = base + ';background:transparent;color:#6f6557';
    return {
      isMobile: d === 'mobile',
      isDesktop: d === 'desktop',
      mobileBtnStyle: d === 'mobile' ? on : off,
      desktopBtnStyle: d === 'desktop' ? on : off,
      setMobile: () => this.setState({ device: 'mobile' }),
      setDesktop: () => this.setState({ device: 'desktop' }),
    };
  }
}
</script>
</body>
</html>
